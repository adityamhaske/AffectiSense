version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - DEVICE=cpu
    volumes:
      - ./data:/app/data
    restart: unless-stopped

